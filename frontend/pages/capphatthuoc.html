<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Cấp phát thuốc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../img/favicon.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background: #eef1f6; color: #111; }

        /* ── Page shell ── */
        .page-shell { padding: 20px; }

        /* ── Header bar ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .page-header h5 { font-size: 20px; font-weight: 700; margin: 0; color: #0f172a; }
        .page-header .sub { font-size: 13px; color: #6c757d; margin-top: 2px; }
        .badge-count {
            display: inline-flex; align-items: center; justify-content: center;
            background: #009CFF; color: #fff; border-radius: 999px;
            font-size: 12px; font-weight: 700; padding: 2px 9px; margin-left: 8px;
        }

        /* ── Filter bar ── */
        .filter-bar {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 10px;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: repeat(4, minmax(140px, 1fr)) auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) {
            .filter-bar { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            .filter-bar { grid-template-columns: 1fr; }
        }

        /* ── Card grid ── */
        .rx-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 16px;
        }

        /* ── Prescription card ── */
        .rx-card {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: box-shadow .2s, border-color .2s;
            position: relative;
        }
        .rx-card:hover { box-shadow: 0 4px 18px rgba(0,156,255,.12); border-color: #009CFF; }

        .rx-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .rx-card-id { font-size: 12px; color: #6c757d; }
        .rx-card-patient { font-size: 16px; font-weight: 700; color: #0f172a; margin: 2px 0 0; }
        .rx-card-meta { font-size: 13px; color: #5d6b80; }
        .rx-card-meta i { width: 16px; }

        .rx-badge-pending {
            display: inline-flex; align-items: center; gap: 4px;
            background: #fff3cd; color: #7a5200;
            border-radius: 999px; font-size: 11px; font-weight: 700;
            padding: 3px 9px; white-space: nowrap;
        }
        .rx-badge-urgent {
            background: #fee2e2; color: #991b1b;
        }

        .rx-stats {
            display: flex; gap: 8px; flex-wrap: wrap;
            background: #f8fafc;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
        }
        .rx-stat { display: flex; flex-direction: column; min-width: 60px; }
        .rx-stat-val { font-weight: 700; color: #0f172a; font-size: 14px; }
        .rx-stat-lbl { color: #6c757d; font-size: 11px; }

        .rx-divider { border: none; border-top: 1px solid #eef1f6; margin: 0; }

        .rx-card-footer { display: flex; justify-content: flex-end; }

        .btn-dispense {
            background: #009CFF;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            border-radius: 8px;
            padding: 7px 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background .2s, transform .1s;
        }
        .btn-dispense:hover { background: #0080d4; color: #fff; }
        .btn-dispense:active { transform: scale(.97); }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            background: #fff;
            border: 1px dashed #dbe3ef;
            border-radius: 12px;
        }
        .empty-state i { font-size: 48px; color: #d1d5db; margin-bottom: 14px; }
        .empty-state h6 { font-size: 16px; font-weight: 600; color: #374151; }

        /* ── Loading skeleton ── */
        .skeleton-card {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            padding: 16px;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .sk-line { height: 12px; border-radius: 6px; background: #e9ecef; margin-bottom: 8px; }
        .sk-line.w-60 { width: 60%; }
        .sk-line.w-80 { width: 80%; }
        .sk-line.w-40 { width: 40%; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* ── Modal: dispense detail ── */
        .modal-dispense .modal-content { border-radius: 14px; border: none; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
        .modal-dispense .modal-header { background: linear-gradient(135deg, #009CFF 0%, #006ec4 100%); color: #fff; border-radius: 14px 14px 0 0; border: none; padding: 18px 24px; }
        .modal-dispense .modal-header .btn-close { filter: invert(1); }
        .modal-dispense .modal-body { padding: 20px 24px; }
        .modal-dispense .modal-footer { border-top: 1px solid #eef1f6; padding: 14px 24px; }

        /* info strip */
        .detail-info-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px 16px;
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        .detail-info-strip .info-item label { font-weight: 600; color: #0369a1; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
        .detail-info-strip .info-item span { color: #0f172a; font-weight: 500; }
        @media (max-width: 576px) {
            .detail-info-strip { grid-template-columns: 1fr 1fr; }
        }

        /* medicine rows in modal */
        .med-rows { display: flex; flex-direction: column; gap: 10px; }

        .med-row {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: border-color .2s, background .2s;
        }
        .med-row.is-out { border-color: #fca5a5; background: #fff5f5; }
        .med-row.is-in  { border-color: #86efac; background: #f0fdf4; }

        .med-row-info { flex: 1; min-width: 0; }
        .med-row-name { font-weight: 700; color: #0f172a; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .med-row-hoat-chat { font-size: 12px; color: #6c757d; }
        .med-row-detail { margin-top: 4px; font-size: 13px; color: #374151; }
        .med-row-dose { font-size: 12px; color: #2563eb; font-weight: 500; margin-top: 2px; }

        .med-row-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }

        .btn-stock {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600;
            border-radius: 7px;
            padding: 5px 11px;
            border: 1.5px solid;
            cursor: pointer;
            transition: .15s;
            white-space: nowrap;
        }
        .btn-stock-in {
            border-color: #22c55e; color: #16a34a; background: #f0fdf4;
        }
        .btn-stock-in.active, .btn-stock-in:hover {
            background: #22c55e; color: #fff; border-color: #22c55e;
        }
        .btn-stock-out {
            border-color: #f87171; color: #dc2626; background: #fff5f5;
        }
        .btn-stock-out.active, .btn-stock-out:hover {
            background: #ef4444; color: #fff; border-color: #ef4444;
        }

        /* progress footer */
        .confirm-footer-info {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .confirm-progress {
            flex: 1;
            display: flex; gap: 8px; align-items: center; font-size: 13px;
        }
        .confirm-progress .cp-bar {
            flex: 1; height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden;
        }
        .confirm-progress .cp-fill {
            height: 100%; background: #22c55e; border-radius: 3px; transition: width .3s;
        }

        /* toast */
        .toast-wrap {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast-msg {
            background: #1e293b; color: #fff; border-radius: 10px;
            padding: 10px 18px; font-size: 14px; font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,.2);
            animation: fadeSlideIn .3s ease;
        }
        .toast-msg.success { background: #166534; }
        .toast-msg.error   { background: #991b1b; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container-xxl position-relative bg-white d-flex p-0">
    <!-- Sidebar -->
    <div class="sidebar pe-4 pb-3">
        <nav class="navbar bg-light navbar-light">
            <a href="../index.html" class="navbar-brand mx-4 mb-3"></a>
            <div class="d-flex align-items-center ms-4 mb-4">
                <div class="position-relative">
                    <img class="rounded-circle" src="../img/user.jpg" alt="" style="width:40px;height:40px;">
                    <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                </div>
                <div class="ms-3"><h6 class="mb-0" id="usernameSidebar"></h6></div>
            </div>
            <div class="navbar-nav w-100"></div>
        </nav>
    </div>

    <!-- Main content -->
    <div class="content">
        <!-- Top navbar -->
        <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0">
            <a href="#" class="sidebar-toggler flex-shrink-0"><i class="fa fa-bars"></i></a>
            <div class="navbar-nav align-items-center ms-auto">
                <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                        <img class="rounded-circle me-lg-2" src="../img/user.jpg" alt="" style="width:40px;height:40px;">
                        <span class="d-none d-lg-inline-flex" id="usernameNavbar"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end bg-light border-0 rounded-0 rounded-bottom m-0">
                        <a href="#" class="dropdown-item">Hồ sơ</a>
                        <a href="#" class="dropdown-item">Đăng xuất</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page body -->
        <div class="container-fluid page-shell">

            <!-- Header -->
            <div class="page-header">
                <div>
                    <h5>
                        <i class="fas fa-prescription-bottle-alt me-2" style="color:#009CFF;"></i>
                        Cấp phát thuốc
                        <span class="badge-count" id="pendingCount">0</span>
                    </h5>
                    <div class="sub">Danh sách đơn thuốc chưa được xuất — dược sĩ bốc thuốc và xác nhận</div>
                </div>
                <button class="btn btn-outline-secondary btn-sm" id="refreshBtn">
                    <i class="fas fa-sync-alt me-1"></i> Làm mới
                </button>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <div>
                    <label class="form-label">Khoa</label>
                    <select class="form-select" id="filterSpecialty">
                        <option value="">Tất cả khoa</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Bác sĩ</label>
                    <select class="form-select" id="filterDoctor">
                        <option value="">Tất cả bác sĩ</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Bệnh nhân</label>
                    <input class="form-control" id="filterPatient" placeholder="Tên hoặc mã BN">
                </div>
                <div>
                    <label class="form-label">Sắp xếp</label>
                    <select class="form-select" id="filterSort">
                        <option value="newest">Mới nhất</option>
                        <option value="oldest">Lâu nhất (ưu tiên)</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-outline-secondary w-100" id="resetFilterBtn">
                        <i class="fa fa-redo me-1"></i> Xóa lọc
                    </button>
                </div>
            </div>

            <!-- Card grid -->
            <div class="rx-grid" id="rxGrid">
                <!-- skeleton loading -->
                <div class="skeleton-card">
                    <div class="sk-line w-60"></div>
                    <div class="sk-line w-80"></div>
                    <div class="sk-line w-40"></div>
                </div>
                <div class="skeleton-card">
                    <div class="sk-line w-80"></div>
                    <div class="sk-line w-60"></div>
                    <div class="sk-line w-40"></div>
                </div>
                <div class="skeleton-card">
                    <div class="sk-line w-40"></div>
                    <div class="sk-line w-80"></div>
                    <div class="sk-line w-60"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ═══════════════ Modal: Chi tiết đơn & Cấp phát ═══════════════ -->
<div class="modal fade modal-dispense" id="dispenseModal" tabindex="-1" aria-labelledby="dispenseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h5 class="modal-title mb-0" id="dispenseModalLabel">Cấp phát thuốc</h5>
                    <div style="font-size:13px;opacity:.85;margin-top:3px;" id="modalSubtitle">Đơn #—</div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Info strip -->
                <div class="detail-info-strip" id="modalInfoStrip"></div>

                <!-- Progress hint -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span style="font-size:13px;font-weight:600;color:#0f172a;">Danh sách thuốc trong đơn</span>
                    <span style="font-size:12px;color:#6c757d;" id="progressLabel">0 / 0 đã xác nhận</span>
                </div>
                <div class="confirm-progress mb-3">
                    <div class="cp-bar"><div class="cp-fill" id="progressBar" style="width:0%"></div></div>
                </div>

                <!-- Medicine rows -->
                <div class="med-rows" id="medRows"></div>
            </div>
            <div class="modal-footer">
                <div class="confirm-footer-info w-100">
                    <span style="font-size:13px;color:#6c757d;" id="footerHint">Xác nhận từng loại thuốc còn/hết hàng trước khi xuất</span>
                    <div class="ms-auto d-flex gap-2">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="button" class="btn btn-success px-4" id="confirmDispenseBtn" disabled>
                            <i class="fas fa-check me-1"></i>Xác nhận xuất thuốc
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/capphatthuoc.js"></script>
</body>
</html>
