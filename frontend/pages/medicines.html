<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>CLINIC</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="../img/favicon.ico" rel="icon">

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <!-- 🔥 CUSTOM CSS -->
    <style>
        /* SEARCH BOX */
        .search-box {
            width: 350px;
        }

        /* TABLE đẹp hơn */
        .table {
            border: 1px solid #dee2e6;
        }

        .table thead th {
            background: #009CFF;
            color: white;
            border: 1px solid #dee2e6;
            text-align: center;
            font-weight: 600;
        }

        .table td {
            border: 1px solid #dee2e6;
            color: #333;
            font-weight: 500;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
        }

        /* BUTTON đẹp */
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-primary {
            background: #009CFF;
            border: none;
            

        }

        .btn-warning {
            background: #ffc107;
            border: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        /* BADGE */
        .badge-success {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .badge-danger {
            background: #dc3545;
            padding: 5px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
<div class="container-xxl position-relative bg-white d-flex p-0">

    <!-- Sidebar giữ nguyên -->
    <div class="sidebar pe-4 pb-3">
        <nav class="navbar bg-light navbar-light">
            <a href="../index.html" class="navbar-brand mx-4 mb-3">
                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CLINIC</h3>
            </a>

            <div class="d-flex align-items-center ms-4 mb-4">
                <img class="rounded-circle" src="../img/user.jpg" style="width:40px">
                <div class="ms-3">
                    <h6 id="usernameSidebar"></h6>
                </div>
            </div>

            <div class="navbar-nav w-100">
                <a href="../index.html" class="nav-item nav-link">
                    <i class="fa fa-tachometer-alt me-2"></i>Thống kê
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-th me-2"></i>Lịch khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-keyboard me-2"></i>Phiếu khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-table me-2"></i>Bệnh án
                </a>

                <!-- <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">
                        <i class="far fa-file-alt me-2"></i>Quản lý thuốc
                    </a>
                    <div class="dropdown-menu bg-transparent border-0">
                        <a href="medicines.html" class="dropdown-item active">Danh mục thuốc</a>
                    </div>
                </div> -->
                <div class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown"><i class="far fa-file-alt me-2"></i>Quản lý thuốc</a>
                        <div class="dropdown-menu bg-transparent border-0">
                            <a href="medicines.html" class="dropdown-item">Danh mục thuốc</a>
                            <a href="suppliers.html" class="dropdown-item">Nhà cung cấp</a>
                            <a href="imports.html" class="dropdown-item">Nhập thuốc</a>
                            <a href="inventory.html" class="dropdown-item">Kho thuốc</a>
                            <a href="dispense.html" class="dropdown-item">Xuất thuốc</a>
                        </div>
                    </div>
            </div>
        </nav>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Navbar giữ nguyên -->
        <nav class="navbar navbar-expand bg-white navbar-light sticky-top px-4 py-0">
            <a href="#" class="sidebar-toggler">
                <i class="fa fa-bars"></i>
            </a>

            <div class="navbar-nav ms-auto">
                <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                        <img class="rounded-circle" src="../img/user.jpg" style="width:40px">
                        <span id="usernameNavbar"></span>
                    </a>
                </div>
            </div>
        </nav>

        <!-- MAIN -->
        <div class="container-fluid pt-4 px-4">

    <!-- SEARCH + BUTTON -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <!-- search co lại -->
        <input id="searchInput" type="text"
            class="form-control"
            style="max-width: 500px; margin-right: 10px;"
            placeholder="Tìm thuốc...">

        <button class="btn btn-primary px-4" onclick="openAddModal()">
            Thêm thuốc
        </button>
    </div>

    <!-- TABLE -->
    <div class="bg-light rounded p-4 shadow-sm">

                <h5 class="mb-3 fw-bold">Danh mục thuốc</h5>

                <table class="table align-middle text-center">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên thuốc</th>
                            <th>Đơn vị</th>
                            <th>Giá</th>
                            <th>Số lượng tồn</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="medicineTable"></tbody>
                </table>

            </div>
        </div>

        <!-- Footer giữ nguyên -->
        <div class="container-fluid pt-4 px-4">
            <div class="bg-light rounded p-3 text-center">
                © Clinic 2026
            </div>
        </div>

    </div>
</div>

<!-- Modal giữ nguyên -->
<div class="modal fade" id="medicineModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm thuốc</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="MaThuoc">

                <div class="mb-3">
                    <label>Tên thuốc</label>
                    <input class="form-control" id="TenThuoc">
                </div>

                <div class="mb-3">
                    <label>Đơn vị</label>
                    <input class="form-control" id="DonViTinh">
                </div>

                <div class="mb-3">
                    <label>Giá</label>
                    <input type="number" class="form-control" id="GiaBan">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-primary" onclick="saveMedicine()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/main.js"></script>
<script src="../js/medicines.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const username = localStorage.getItem('username');
    if (username) {
        document.getElementById('usernameSidebar').textContent = username;
        document.getElementById('usernameNavbar').textContent = username;
    }
});
</script>

</body>
</html>
