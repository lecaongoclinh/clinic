<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CLINIC</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="../img/favicon.ico" rel="icon">

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <!-- 🔥 CUSTOM CSS -->
    <style>
        /* SEARCH BOX */
        .search-box {
            width: 350px;
        }

        /* TABLE đẹp hơn */
        .table {
            border: 1px solid #dee2e6;
        }

        .table thead th {
            background: #009CFF;
            color: white;
            border: 1px solid #dee2e6;
            text-align: center;
            font-weight: 600;
        }

        .table td {
            border: 1px solid #dee2e6;
            color: #333;
            font-weight: 500;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
        }

        /* BUTTON đẹp */
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-primary {
            background: #009CFF;
            border: none;
            

        }

        .btn-warning {
            background: #ffc107;
            border: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        /* BADGE */
        .badge-success {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .badge-danger {
            background: #dc3545;
            padding: 5px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
<div class="container-xxl position-relative bg-white d-flex p-0">

    <!-- Sidebar giữ nguyên -->
    <div class="sidebar pe-4 pb-3">
        <nav class="navbar bg-light navbar-light">
            <a href="../index.html" class="navbar-brand mx-4 mb-3">
                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CLINIC</h3>
            </a>

            <div class="d-flex align-items-center ms-4 mb-4">
                <img class="rounded-circle" src="../img/user.jpg" style="width:40px">
                <div class="ms-3">
                    <h6 id="usernameSidebar"></h6>
                </div>
            </div>

            <div class="navbar-nav w-100">
                <a href="../index.html" class="nav-item nav-link">
                    <i class="fa fa-tachometer-alt me-2"></i>Thống kê
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-th me-2"></i>Lịch khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-keyboard me-2"></i>Phiếu khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-table me-2"></i>Bệnh án
                </a>

                <!-- <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">
                        <i class="far fa-file-alt me-2"></i>Quản lý thuốc
                    </a>
                    <div class="dropdown-menu bg-transparent border-0">
                        <a href="medicines.html" class="dropdown-item active">Danh mục thuốc</a>
                    </div>
                </div> -->
                <div class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown"><i class="far fa-file-alt me-2"></i>Quản lý thuốc</a>
                        <div class="dropdown-menu bg-transparent border-0">
                            <a href="medicines.html" class="dropdown-item">Danh mục thuốc</a>
                            <a href="suppliers.html" class="dropdown-item">Nhà cung cấp</a>
                            <a href="imports.html" class="dropdown-item">Nhập thuốc</a>
                            <a href="inventory.html" class="dropdown-item">Kho thuốc</a>
                            <a href="dispense.html" class="dropdown-item">Xuất thuốc</a>
                        </div>
                    </div>
            </div>
        </nav>
    </div>

    <!-- CONTENT -->
    <div class="content p-4 w-100">

        <!-- DASHBOARD -->
        <div class="row mb-4">
            <div class="col">
                <div class="bg-light p-3 rounded text-center shadow-sm">
                    <h6>Tổng thuốc</h6>
                    <h4 id="totalMedicines">0</h4>
                </div>
            </div>
            <div class="col">
                <div class="bg-light p-3 rounded text-center shadow-sm">
                    <h6>Sắp hết</h6>
                    <h4 id="lowStock">0</h4>
                </div>
            </div>
            <div class="col">
                <div class="bg-light text-white p-3 rounded text-center shadow-sm">
                    <h6>Hết hạn</h6>
                    <h4 id="expired">0</h4>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="mb-3">
            <select class="form-select w-auto" onchange="handleFilter(this.value)">
                <option value="all">Tất cả</option>
                <option value="low">Sắp hết</option>
                <option value="expired">Hết hạn</option>
            </select>
        </div>

        <!-- TABLE TỔNG -->
        <div class="bg-light rounded p-4 mb-4 shadow-sm">
            <h4>Tổng kho</h4>

            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Thuốc</th>
                        <th>Đơn vị</th>
                        <th>Tồn</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable"></tbody>
            </table>
        </div>

        <!-- TABLE LÔ -->
        <div class="bg-light rounded p-4 shadow-sm">
            <h4>Chi tiết theo lô</h4>

            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Thuốc</th>
                        <th>Số lô</th>
                        <th>HSD</th>
                        <th>Số lượng</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="batchTable"></tbody>
            </table>
        </div>

    </div>
</div>

<script src="../js/inventory.js"></script>
</body>
</html>
