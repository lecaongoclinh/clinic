<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Quản lý bệnh nhân</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../img/favicon.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #eef1f6; color: #111; }
        .page-shell { padding: 18px; }
        .page-panel { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 18px; }
        .toolbar { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; margin-bottom: 16px; }
        .search-box { min-width: 280px; max-width: 420px; flex: 1; }
        .table th { font-size: 13px; font-weight: 700; color: #111; white-space: nowrap; }
        .table td { color: #111; vertical-align: middle; }
        .patient-name-col { min-width: 260px; width: 28%; }
        .patient-address-col { max-width: 180px; width: 18%; }
        .patient-address-text {
            display: block;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            position: relative;
            cursor: default;
        }
        .patient-address-text:hover::after {
            content: attr(data-address);
            position: absolute;
            left: 0;
            top: calc(100% + 6px);
            z-index: 1050;
            width: max-content;
            max-width: 360px;
            padding: 8px 10px;
            border-radius: 6px;
            background: #111827;
            color: #fff;
            font-size: 13px;
            line-height: 1.4;
            white-space: normal;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        }
        .action-btn { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; }
        .empty-row { color: #6c757d; text-align: center; padding: 28px 0 !important; }
    </style>
</head>
<body>
<div class="container-xxl position-relative bg-white d-flex p-0">
    <div class="sidebar pe-4 pb-3">
        <nav class="navbar bg-light navbar-light">
            <a href="../index.html" class="navbar-brand mx-4 mb-3"></a>
            <div class="d-flex align-items-center ms-4 mb-4">
                <div class="position-relative">
                    <img class="rounded-circle" src="../img/user.jpg" alt="" style="width: 40px; height: 40px;">
                    <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                </div>
                <div class="ms-3"><h6 class="mb-0" id="usernameSidebar"></h6></div>
            </div>
            <div class="navbar-nav w-100"></div>
        </nav>
    </div>

    <div class="content">
        <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0">
            <a href="#" class="sidebar-toggler flex-shrink-0"><i class="fa fa-bars"></i></a>
            <div class="navbar-nav align-items-center ms-auto">
                <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                        <img class="rounded-circle me-lg-2" src="../img/user.jpg" alt="" style="width: 40px; height: 40px;">
                        <span class="d-none d-lg-inline-flex" id="usernameNavbar"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end bg-light border-0 rounded-0 rounded-bottom m-0">
                        <a href="#" class="dropdown-item">Hồ sơ</a>
                        <a href="#" class="dropdown-item">Đăng xuất</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container-fluid page-shell">
            <div class="page-panel">
                <div class="toolbar">
                    <div>
                        <h5 class="mb-1">Quản lý bệnh nhân</h5>
                        <div class="text-muted small">Danh sách hồ sơ bệnh nhân trong hệ thống</div>
                    </div>
                    <div class="input-group search-box">
                        <span class="input-group-text"><i class="fa fa-search"></i></span>
                        <input id="patientSearch" class="form-control" placeholder="Tìm theo tên, mã BN, SĐT">
                        <button class="btn btn-primary" id="searchBtn">Lọc</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Mã BN</th>
                                <th class="patient-name-col">Họ tên</th>
                                <th>Ngày sinh</th>
                                <th>Giới tính</th>
                                <th>SĐT</th>
                                <th class="patient-address-col">Địa chỉ</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="patientsTableBody">
                            <tr><td colspan="7" class="empty-row">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div class="text-muted small" id="patientCount">0 bệnh nhân</div>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm" id="prevPage">Trước</button>
                        <button class="btn btn-outline-secondary btn-sm disabled" id="pageInfo">1</button>
                        <button class="btn btn-outline-secondary btn-sm" id="nextPage">Sau</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="patientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Chỉnh sửa bệnh nhân</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="patientId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                        <input class="form-control" id="patientName">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                        <input class="form-control" id="patientPhone">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" id="patientEmail" type="email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày sinh</label>
                        <input class="form-control" id="patientDob" type="date">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Giới tính</label>
                        <select class="form-select" id="patientGender">
                            <option value="">Chưa chọn</option>
                            <option value="Nam">Nam</option>
                            <option value="Nu">Nữ</option>
                            <option value="Khac">Khác</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Địa chỉ</label>
                        <input class="form-control" id="patientAddress">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="savePatientBtn">Lưu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/patients.js"></script>
</body>
</html>
