<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Nhập thuốc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT -->
    <link href="../img/favicon.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- ICON -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">

    <!-- 🔥 MODERN STYLE -->
    <style>
        .card-box {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .table thead th {
            background: #009CFF;
            color: white;
            text-align: center;
        }

        .table td {
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: #f5f9ff;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
        }

        .form-control, .form-select {
            border-radius: 8px;
        }

        .btn {
            border-radius: 8px;
        }

        .search-box {
            max-width: 350px;
        }
    </style>
        <style>
        /* SEARCH BOX */
        .search-box {
            width: 350px;
        }

        /* TABLE đẹp hơn */
        .table {
            border: 1px solid #dee2e6;
        }

        .table thead th {
            background: #009CFF;
            color: white;
            border: 1px solid #dee2e6;
            text-align: center;
            font-weight: 600;
        }

        .table td {
            border: 1px solid #dee2e6;
            color: #333;
            font-weight: 500;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
        }

        /* BUTTON đẹp */
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-primary {
            background: #009CFF;
            border: none;
            

        }

        .btn-warning {
            background: #ffc107;
            border: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        /* BADGE */
        .badge-success {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .badge-danger {
            background: #dc3545;
            padding: 5px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
<div class="container-xxl position-relative bg-white d-flex p-0">

    <!-- Sidebar giữ nguyên -->
    <div class="sidebar pe-4 pb-3">
        <nav class="navbar bg-light navbar-light">
            <a href="../index.html" class="navbar-brand mx-4 mb-3">
                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CLINIC</h3>
            </a>

            <div class="d-flex align-items-center ms-4 mb-4">
                <img class="rounded-circle" src="../img/user.jpg" style="width:40px">
                <div class="ms-3">
                    <h6 id="usernameSidebar"></h6>
                </div>
            </div>

            <div class="navbar-nav w-100">
                <a href="../index.html" class="nav-item nav-link">
                    <i class="fa fa-tachometer-alt me-2"></i>Thống kê
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-th me-2"></i>Lịch khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-keyboard me-2"></i>Phiếu khám
                </a>

                <a href="#" class="nav-item nav-link">
                    <i class="fa fa-table me-2"></i>Bệnh án
                </a>

                <!-- <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">
                        <i class="far fa-file-alt me-2"></i>Quản lý thuốc
                    </a>
                    <div class="dropdown-menu bg-transparent border-0">
                        <a href="medicines.html" class="dropdown-item active">Danh mục thuốc</a>
                    </div>
                </div> -->
                <div class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown"><i class="far fa-file-alt me-2"></i>Quản lý thuốc</a>
                        <div class="dropdown-menu bg-transparent border-0">
                            <a href="medicines.html" class="dropdown-item">Danh mục thuốc</a>
                            <a href="suppliers.html" class="dropdown-item">Nhà cung cấp</a>
                            <a href="imports.html" class="dropdown-item">Nhập thuốc</a>
                            <a href="inventory.html" class="dropdown-item">Kho thuốc</a>
                            <a href="dispense.html" class="dropdown-item">Xuất thuốc</a>
                        </div>
                    </div>
            </div>
        </nav>
    </div>


    <!-- CONTENT -->
    <div class="content">

        <!-- HEADER -->
        <!-- <nav class="navbar navbar-expand bg-white navbar-light sticky-top px-4 py-0">
            <h5 class="mb-0">
                <i class="fa fa-truck-loading me-2"></i>Nhập thuốc
            </h5>
        </nav> -->

        <div class="container-fluid pt-4 px-4">

            <!-- NCC + SEARCH -->
            <div class="card-box mb-4">
                <div class="d-flex justify-content-between align-items-center">

                    <div style="width:300px">
                        <label class="fw-bold mb-1">Nhà cung cấp</label>
                        <select id="supplierSelect" class="form-select"></select>
                    </div>

                    <input id="searchInput" class="form-control search-box"
                        placeholder="Tìm thuốc...">
                </div>
            </div>

            <!-- DANH SÁCH THUỐC -->
            <div class="card-box mb-4">
                <h5 class="mb-3">Danh sách thuốc</h5>

                <table class="table align-middle text-center">
                    <thead>
                        <tr>
                            <th>Tên thuốc</th>
                            <th>ĐVT</th>
                            <th>Tồn</th>
                            <th>Giá nhập</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="medicineList"></tbody>
                </table>
            </div>

            <!-- PHIẾU NHẬP -->
            <div class="card-box mb-4">
                <h5 class="mb-3">Phiếu nhập</h5>

                <table class="table align-middle text-center">
                    <thead>
                        <tr>
                            <th>Thuốc</th>
                            <th>SL</th>
                            <th>Giá</th>
                            <th>HSD</th>
                            <th>Lô</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cartTable"></tbody>
                </table>

                <div class="text-end fw-bold fs-5 mb-3">
                    Tổng tiền: <span id="totalMoney">0 đ</span>
                </div>

                <div class="text-end">
                    <button class="btn btn-primary px-4" onclick="submitImport()">
                        <i class="fa fa-save"></i> Tạo phiếu nhập
                    </button>
                </div>
            </div>

            <!-- DANH SÁCH PHIẾU -->
            <div class="card-box">
                <h5 class="mb-3">Danh sách phiếu nhập</h5>

                <table class="table align-middle text-center">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nhà cung cấp</th>
                            <th>Ngày nhập</th>
                        </tr>
                    </thead>
                    <tbody id="importList"></tbody>
                </table>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="container-fluid pt-4 px-4">
            <div class="bg-light rounded p-3 text-center">
                © Clinic 2026
            </div>
        </div>

    </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/imports.js"></script>

</body>
</html>
