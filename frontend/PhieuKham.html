    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            }
            const username = localStorage.getItem('username');
            console.log("Username from localStorage:", username);
            if (username) {
                document.getElementById('username').textContent = username;
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            const selectKhoa = document.getElementById('selectKhoa');
            const selectBacSi = document.getElementById('selectBacSi');
            const calendarEl = document.getElementById('calendar');

            // 1. Khởi tạo Lịch
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'vi',
            slotMinTime: '8:00:00', 
            slotMaxTime: '19:00:00',
            allDaySlot: false,
            weekends: false,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },

            // Hiển thị nội dung tùy chỉnh trên ô lịch
            eventContent: function(arg) {
                const { event } = arg;
                const lyDo = event.extendedProps.LyDoKham || '';
                const bacSi = event.extendedProps.TenBacSi || '';
        
            // Tạo HTML hiển thị trên lịch
                let arrayOfDomNodes = []
                let titleEl = document.createElement('div')
                titleEl.className = 'fc-event-main-frame'
                titleEl.innerHTML = `
                    <div style="font-size: 0.8em; font-style: italic;"> ${event.start.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})} </div> 
                    <div style="font-size: 0.85em;">Bệnh nhân: ${event.title}</div>
                    <div style="font-size: 0.85em;">Bác sĩ: ${bacSi}</div>
                `;
                arrayOfDomNodes.push(titleEl)
                return { domNodes: arrayOfDomNodes }
            },

            // Hiển thị tooltip khi di chuột vào
            eventDidMount: function(info) {
                const { event } = info;
                const tooltipContent = `
                    Bệnh nhân: ${event.title}
                    Bác sĩ: ${event.extendedProps.TenBacSi}
                    Khoa: ${event.extendedProps.TenChuyenKhoa}
                    Lý do: ${event.extendedProps.LyDoKham}
                    Thời gian: ${event.start.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})}
                `;
            
                
                tippy(info.el, {
                    content: tooltipContent.replace(/\n/g, '<br>'),
                    allowHTML: true,
                    theme: 'light-border'
                });
                
            },

            events: function(info, successCallback, failureCallback) {
                const maChuyenKhoa = selectKhoa.value || '';
                const maBacSi = selectBacSi.value || '';
                
                fetch(`http://localhost:3000/api/appointments?maChuyenKhoa=${maChuyenKhoa}&maBacSi=${maBacSi}`)
                    .then(res => {
                        if (!res.ok) throw new Error("Lỗi lấy lịch khám");
                        return res.json();
                    })
                    .then(data => {
                        // FullCalendar tự động đưa các trường không phải id/title/start vào extendedProps
                        successCallback(Array.isArray(data) ? data : []);
                        console.log("Dữ liệu lịch đã tải thành công:", data);
                    })
                    .catch(err => {
                        console.error("Lỗi Fetch Lịch:", err);
                        failureCallback(err);
                    });
            }
        });

        calendar.render();

            // 2. Load danh sách khoa khi trang tải xong
            fetch('http://localhost:3000/api/specialty')
                .then(res => res.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        data.forEach(k => {
                            const option = new Option(k.TenChuyenKhoa, k.MaChuyenKhoa);
                            selectKhoa.add(option);
                        });
                    }
                })
                .catch(err => console.error("Lỗi Fetch Khoa:", err));

            // 3. Sự kiện khi chọn Khoa
            selectKhoa.addEventListener('change', async function() {
                const maKhoa = this.value;
                
                // Reset ô chọn bác sĩ về trạng thái ban đầu
                selectBacSi.innerHTML = '<option value="">-- Tất cả bác sĩ --</option>';
                
                if (maKhoa) {
                    selectBacSi.disabled = false;
                    try {
                        const res = await fetch(`http://localhost:3000/api/doctor/doctor-by-specialty?maChuyenKhoa=${maKhoa}`);
                        if (!res.ok) throw new Error("Lỗi lấy danh sách bác sĩ");
                        
                        const doctors = await res.json();
                        if (Array.isArray(doctors)) {
                            doctors.forEach(bs => {
                                const option = new Option(bs.HoTen, bs.MaNV);
                                selectBacSi.add(option);
                            });
                        }
                    } catch (err) {
                        console.error("Lỗi load bác sĩ:", err);
                        selectBacSi.disabled = true;
                    }
                } else {
                    selectBacSi.disabled = true;
                }
                
                // Luôn refetch để cập nhật lịch (trường hợp chọn lại "Tất cả khoa")
                calendar.refetchEvents();
            });

            // 4. Sự kiện khi chọn Bác sĩ
            selectBacSi.addEventListener('change', () => {
                calendar.refetchEvents();
            });
        });
    </script>
