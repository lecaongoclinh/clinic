<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>CLINIC - Đăng ký</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->

        <!-- Sign Up Start -->
        <div class="container-fluid">
            <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <a href="index.html">
                                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CLINIC</h3>
                            </a>
                            <h3>Đăng ký</h3>
                        </div>

                        <form id="registerForm">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="hoTen" placeholder="Nguyễn Văn A" required>
                                <label for="hoTen">Họ tên</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="soDienThoai" placeholder="0901234567" required>
                                <label for="soDienThoai">Số điện thoại</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                <label for="email">Email</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" placeholder="username" required>
                                <label for="username">Tên đăng nhập</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="password" placeholder="Password" required>
                                <label for="password">Mật khẩu</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                                <label for="confirmPassword">Nhập lại mật khẩu</label>
                            </div>

                            <div class="form-floating mb-3">
                                <select class="form-select" id="maVaiTro" required>
                                    <option value="" selected disabled>Chọn vai trò</option>
                                    <option value="1">Admin</option>
                                    <option value="2">Bác sĩ</option>
                                    <option value="3">Lễ tân</option>
                                    <option value="6">Nhân viên kho</option>
                                    <option value="5">Dược sĩ</option>
                                    <option value="4">Thu ngân</option>
                                </select>
                                <label for="maVaiTro">Vai trò</label>
                            </div>

                            <div class="form-floating mb-4" id="chuyenKhoaGroup" style="display: none;">
                                <select class="form-select" id="maChuyenKhoa">
                                    <option value="">Không chọn</option>
                                    <option value="1">Nội Tổng Quát</option>
                                    <option value="2">Nhi Khoa</option>
                                    <option value="3">Sản Phụ Khoa</option>
                                    <option value="4">Da Liễu</option>
                                    <option value="5">Tim Mạch</option>
                                    <option value="6">Tai Mũi Họng</option>
                                </select>
                                <label for="maChuyenKhoa">Chuyên khoa</label>
                            </div>

                            <button type="submit" class="btn btn-primary py-3 w-100 mb-4">Đăng ký</button>

                            <p class="text-center mb-0">
                                Đã có tài khoản?
                                <a href="dangnhap.html">Đăng nhập</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Sign Up End -->
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/chart/chart.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="lib/tempusdominus/js/moment.min.js"></script>
    <script src="lib/tempusdominus/js/moment-timezone.min.js"></script>
    <script src="lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>

    <script>
        const registerForm = document.getElementById('registerForm');
        const maVaiTro = document.getElementById('maVaiTro');
        const chuyenKhoaGroup = document.getElementById('chuyenKhoaGroup');
        const maChuyenKhoa = document.getElementById('maChuyenKhoa');

        // Chỉ hiện chuyên khoa khi vai trò là Bác sĩ
        maVaiTro.addEventListener('change', () => {
            if (maVaiTro.value === '2') {
                chuyenKhoaGroup.style.display = 'block';
                maChuyenKhoa.setAttribute('required', 'required');
            } else {
                chuyenKhoaGroup.style.display = 'none';
                maChuyenKhoa.removeAttribute('required');
                maChuyenKhoa.value = '';
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const hoTen = document.getElementById('hoTen').value.trim();
            const soDienThoai = document.getElementById('soDienThoai').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const vaiTro = maVaiTro.value;
            const chuyenKhoa = maChuyenKhoa.value || null;

            if (password !== confirmPassword) {
                alert('Mật khẩu nhập lại không khớp!');
                return;
            }

            if (password.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }

            const userData = {
                hoTen,
                soDienThoai,
                email,
                username,
                password,
                maVaiTro: Number(vaiTro),
                maChuyenKhoa: chuyenKhoa ? Number(chuyenKhoa) : null
            };

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Đăng ký thành công!');
                    window.location.href = 'signin.html';
                } else {
                    alert(data.message || 'Đăng ký thất bại!');
                }
            } catch (error) {
                console.error('Lỗi:', error);
                alert('Có lỗi xảy ra. Vui lòng thử lại sau.');
            }
        });
    </script>
</body>

</html>
