    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Kiểm tra token
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/signin';
                return;
            }
            const username = localStorage.getItem('username');
            console.log("Username from localStorage:", username);
            if (username) {
                document.getElementById('username').textContent = username;
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            const selectKhoa = document.getElementById('selectKhoa');
            const selectBacSi = document.getElementById('selectBacSi');
            const calendarEl = document.getElementById('calendar');
            const inputTenBN = document.getElementById('tenBN');
            const btnCreateAppointment = document.getElementById('btnCreateAppointment');
            const createAppointmentModal = new bootstrap.Modal(document.getElementById('createAppointmentModal'));
            const editAppointmentModal = new bootstrap.Modal(document.getElementById('editAppointmentModal'));
            const maBacSiCreate = document.getElementById('maBacSiCreate');
            const pendingTableBody = document.getElementById('pendingAppointmentsTable').querySelector('tbody');

            let allDoctors = []; // Store all doctors for create form

            // Load all doctors for create form
            async function loadAllDoctors() {
                try {
                    const res = await fetch('http://localhost:3000/api/doctor');
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    console.log("Doctors loaded:", data);
                    if (Array.isArray(data)) {
                        allDoctors = data;

                        // form create
                        maBacSiCreate.innerHTML = '<option value="">-- Chọn bác sĩ --</option>';
                        data.forEach(bs => {
                            const option = new Option(`${bs.HoTen} (${bs.TenChuyenKhoa || 'Chưa xác định'})`, bs.MaNV);
                            maBacSiCreate.add(option);
                        });

                        // form edit
                        const editSelect = document.getElementById('editMaBacSi');
                        editSelect.innerHTML = '<option value="">-- Chọn bác sĩ --</option>';
                        data.forEach(bs => {
                            const option = new Option(`${bs.HoTen} (${bs.TenChuyenKhoa || 'Chưa xác định'})`, bs.MaNV);
                            editSelect.add(option);
                        });
                    }
                } catch (err) {
                    console.error("Lỗi load bác sĩ:", err);
                    // alert("Không tải được danh sách bác sĩ. Kiểm tra server.");
                }
            }

            // Load pending appointments for table
            function loadPendingAppointments() {
                fetch(`http://localhost:3000/api/appointments?tenBN=${encodeURIComponent(inputTenBN.value || '')}&maChuyenKhoa=${selectKhoa.value || ''}&maBacSi=${selectBacSi.value || ''}`)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(data => {
                        pendingTableBody.innerHTML = '';
                        if (Array.isArray(data)) {
                            const pending = data.filter(app => app.TrangThai === 'ChoXacNhan');
                            console.log("Pending appointments:", pending);
                            if (pending.length === 0) {
                                pendingTableBody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Không có lịch chờ xác nhận</td></tr>';
                            }
                            pending.forEach(app => {
                                const row = document.createElement('tr');
                                row.innerHTML = `
                                    <td>${app.id}</td>
                                    <td>${app.title}</td>
                                    <td>${app.TenBacSi}</td>
                                    <td>${new Date(app.start).toLocaleDateString('vi-VN')}</td>
                                    <td>${new Date(app.start).toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})}</td>
                                    <td>${app.LyDoKham || ''}</td>
                                    <td>
                                        <button class="btn btn-sm btn-success confirm-btn" data-id="${app.id}" title="Xác nhận"> Xác nhận</button>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-primary edit-btn" data-id="${app.id}" data-mabn="${app.MaBN}" title="Sửa">✎ Sửa</button>
                                        <button class="btn btn-sm btn-danger delete-btn" data-id="${app.id}" title="Xóa">✕ Xóa</button>
                                    </td>
                                `;
                                pendingTableBody.appendChild(row);
                            });
                        }
                    })
                    .catch(err => console.error("Lỗi load pending:", err));
            }

            // Khởi tạo FullCalendar
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'vi',
                slotMinTime: '08:00:00',
                slotMaxTime: '19:00:00',
                allDaySlot: false,
                weekends: false,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },

            // Load events từ API
            events: function(info, successCallback, failureCallback) {
                const maChuyenKhoa = selectKhoa.value || '';
                const maBacSi = selectBacSi.value || '';
                const tenBN = inputTenBN.value || '';

                fetch(`http://localhost:3000/api/appointments?tenBN=${encodeURIComponent(tenBN)}&maChuyenKhoa=${maChuyenKhoa}&maBacSi=${maBacSi}`)
                    .then(res => {
                        if (!res.ok) throw new Error("Lỗi lấy lịch khám");
                        return res.json();
                    })
                    .then(data => {
                        console.log("Dữ liệu từ API:", data);
                        // Hiện tất cả appointments (không filter theo TrangThai)
                        const appointments = Array.isArray(data) ? data : [];
                        console.log("Số bản ghi:", appointments.length);
                        successCallback(appointments);
                    })
                    .catch(err => {
                        console.error("Lỗi Fetch Lịch:", err);
                        failureCallback(err);
                    });
            },

        const maBacSiCreateSelect = document.getElementById('maBacSiCreate');

        const appointmentDetailsStep = document.getElementById('appointmentDetailsStep');

        // STEP 1: Tìm kiếm bệnh nhân
        searchPatientInput.addEventListener('input', async (e) => {
            const tenBN = e.target.value.trim();
            
            if (tenBN.length < 2) {
                patientListContainer.style.display = 'none';
                patientInfoContainer.style.display = 'none';
                newPatientFormContainer.style.display = 'none';
                currentPatientId = null;
                isNewPatient = false;
                updateStepsVisibility();
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/api/patients/search?tenBN=${encodeURIComponent(tenBN)}`);
                const patients = await res.json();

                if (Array.isArray(patients) && patients.length > 0) {
                    // Có bệnh nhân tìm được
                    patientListContainer.style.display = 'block';
                    patientList.innerHTML = '';
                    
                    patients.forEach(patient => {
                        const item = document.createElement('button');
                        item.type = 'button';
                        item.className = 'list-group-item list-group-item-action';
                        item.innerHTML = `<strong>${patient.HoTen}</strong><br><small>ID: ${patient.MaBN} | SĐT: ${patient.SoDienThoai}</small>`;

                        patientList.appendChild(item);
                    });

                    const newBtn = document.createElement('button');
                    newBtn.type = 'button';
                    newBtn.className = 'list-group-item list-group-item-action text-primary';
                    newBtn.innerHTML = '<strong>+ Thêm bệnh nhân mới</strong>';

                alert('Lỗi tìm kiếm bệnh nhân');
            }
        });

        // STEP 2: Chọn bệnh nhân từ danh sách
        function selectPatient(patient) {
            currentPatientId = patient.MaBN;
            isNewPatient = false;

            newPatientFormContainer.style.display = 'none';
            
            // Hiển thị thông tin bệnh nhân

                <strong>ID:</strong> ${patient.MaBN}<br>
                <strong>Số điện thoại:</strong> ${patient.SoDienThoai}<br>

        maChuyenKhoaSelect.addEventListener('change', async (e) => {

        // SUBMIT: Tạo lịch khám (và bệnh nhân mới nếu cần)
        async function submitCreateAppointment() {
            // Bước 1: Xác định maBN
            let maBN = currentPatientId;

            if (isNewPatient) {
                const hoTen = document.getElementById('newPatientName').value.trim();
                const soDienThoai = document.getElementById('newPatientPhone').value.trim();
                const diaChi = document.getElementById('newPatientAddress').value.trim();
                const ngaySinh = document.getElementById('newPatientDOB').value;

                if (!hoTen || !soDienThoai || !diaChi || !ngaySinh) {
                    alert('Vui lòng điền đầy đủ thông tin bệnh nhân mới');
                    return;
                }

                // Tạo bệnh nhân mới
                try {
                    const res = await fetch('http://localhost:3000/api/patients', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            hoTen,
                            soDienThoai,
                            diaChi,
                            ngaySinh
                        })
                    });

                    if (!res.ok) throw new Error('Lỗi tạo bệnh nhân mới');
                    
                    const result = await res.json();
                    maBN = result.maBN;
                } catch (err) {
                    console.error('Lỗi tạo bệnh nhân:', err);
                    alert('Lỗi tạo bệnh nhân mới');
                    return;
                }
            }

            // Bước 2: Tạo lịch khám
            const maBacSi = document.getElementById('maBacSiCreate').value;
            const ngayHen = document.getElementById('ngayHen').value;
            const gioHen = document.getElementById('gioHen').value;
            const lyDoKham = document.getElementById('lyDoKham').value;

            if (!maBN || !maBacSi || !ngayHen || !gioHen) {
                alert('Vui lòng điền đầy đủ thông tin bắt buộc');
                return;
            }

            try {
                const res = await fetch('http://localhost:3000/api/appointments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ maBN, maBacSi, ngayHen, gioHen, lyDoKham })
                });

                if (res.ok) {
                    alert('Tạo lịch khám thành công!');
                    createAppointmentModal.hide();
                    resetCreateForm();
                    calendar.refetchEvents();
                    loadPendingAppointments();
                } else {
                    const error = await res.json();
                    alert('Lỗi: ' + error.error);
                }
            } catch (err) {
                console.error('Lỗi tạo lịch:', err);
                alert('Lỗi tạo lịch khám');
            }
        }

        // Helper: Reset form tạo lịch
        function resetCreateForm() {
            document.getElementById('createAppointmentForm').reset();

            isNewPatient = false;
            patientListContainer.style.display = 'none';
            patientInfoContainer.style.display = 'none';

            // Open edit modal
            function openEditModal(maLK) {
                fetch(`http://localhost:3000/api/appointments?tenBN=&maChuyenKhoa=&maBacSi=`)
                    .then(res => res.json())
                    .then(data => {
                        const appointment = data.find(app => app.id == maLK);
                        if (appointment) {
                            // Store basic info
                            document.getElementById('editMaLK').value = appointment.id;
                            document.getElementById('editMaBN').value = appointment.MaBN;
                            document.getElementById('editTrangThai').value = appointment.TrangThai;

                            // STEP 1: Display patient info
                            const editPatientInfoDisplay = document.getElementById('editPatientInfoDisplay');
                            editPatientInfoDisplay.innerHTML = `
                                <strong>Bệnh nhân:</strong> ${appointment.title}<br>
                                <strong>ID:</strong> ${appointment.MaBN}<br>
                                <strong>Bác sĩ hiện tại:</strong> ${appointment.TenBacSi}<br>
                                <strong>Chuyên khoa hiện tại:</strong> ${appointment.TenChuyenKhoa}
                            `;

                            // Set current values
                            document.getElementById('editNgayHen').value = new Date(appointment.start).toISOString().split('T')[0];
                            document.getElementById('editGioHen').value = new Date(appointment.start).toTimeString().slice(0,5);
                            document.getElementById('editLyDoKham').value = appointment.LyDoKham || '';

                            // STEP 2: Load specialties and pre-fill current specialty
                            // Use TenChuyenKhoa and TenBacSi to find MaChuyenKhoa and MaBacSi
                            loadEditSpecialtiesWithCurrentName(appointment.TenChuyenKhoa, appointment.TenBacSi);

                            // Show/hide confirm button based on status
                            const btnConfirm = document.getElementById('btnConfirm');
                            const btnSubmitEdit = document.getElementById('btnSubmitEdit');
                            if (appointment.TrangThai === 'ChoXacNhan') {
                                btnConfirm.style.display = 'inline-block';
                                btnSubmitEdit.style.display = 'inline-block';
                            } else {
                                btnConfirm.style.display = 'none';
                                btnSubmitEdit.style.display = 'inline-block';
                            }

                            editAppointmentModal.show();
                        }
                    })
                    .catch(err => console.error('Lỗi load appointment:', err));
            }

            // Load specialties for edit form with pre-selected current specialty by name
            function loadEditSpecialtiesWithCurrentName(currentTenChuyenKhoa, currentTenBacSi) {
                const editMaChuyenKhoa = document.getElementById('editMaChuyenKhoa');
                fetch('http://localhost:3000/api/specialty')
                    .then(res => res.json())
                    .then(specialties => {
                        editMaChuyenKhoa.innerHTML = '<option value="">-- Chọn chuyên khoa --</option>';
                        let foundMaChuyenKhoa = null;
                        
                        if (Array.isArray(specialties)) {
                            specialties.forEach(specialty => {
                                const option = new Option(specialty.TenChuyenKhoa, specialty.MaChuyenKhoa);
                                editMaChuyenKhoa.add(option);
                                
                                // Find current specialty code by name
                                if (specialty.TenChuyenKhoa === currentTenChuyenKhoa) {
                                    foundMaChuyenKhoa = specialty.MaChuyenKhoa;
                                }
                            });
                        }
                        
                        // Pre-select current specialty if found
                        if (foundMaChuyenKhoa) {
                            editMaChuyenKhoa.value = foundMaChuyenKhoa;
                            // Load doctors for current specialty and pre-select current doctor
                            loadEditDoctorsWithCurrentName(foundMaChuyenKhoa, currentTenBacSi);
                        } else {
                            showEditSteps();
                        }
                    })
                    .catch(err => console.error('Lỗi load chuyên khoa:', err));
            }

            // Load doctors for current specialty with pre-selected doctor by name
            function loadEditDoctorsWithCurrentName(maChuyenKhoa, currentTenBacSi) {
                const editMaBacSiStep = document.getElementById('editMaBacSiStep');
                
                fetch(`http://localhost:3000/api/doctor/doctor-by-specialty?maChuyenKhoa=${maChuyenKhoa}`)
                    .then(res => res.json())
                    .then(doctors => {
                        editMaBacSiStep.innerHTML = '<option value="">-- Chọn bác sĩ --</option>';
                        let foundMaBacSi = null;
                        
                        if (Array.isArray(doctors)) {
                            doctors.forEach(doctor => {
                                const option = new Option(doctor.HoTen, doctor.MaNV);
                                editMaBacSiStep.add(option);
                                
                                // Find current doctor code by name
                                if (doctor.HoTen === currentTenBacSi) {
                                    foundMaBacSi = doctor.MaNV;
                                }
                            });
                        }
                        
                        // Pre-select current doctor if found
                        if (foundMaBacSi) {
                            editMaBacSiStep.value = foundMaBacSi;
                        }
                        
                        showEditStepsWithDoctor();
                    })
                    .catch(err => console.error('Lỗi load bác sĩ:', err));
            }

                const maBacSi = document.getElementById('editMaBacSiStep').value || null;

                    const res = await fetch(`http://localhost:3000/api/appointments/${maLK}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ maBN, maBacSi, ngayHen, gioHen, lyDoKham, trangThai })
                    });

                    if (res.ok) {
                        alert('Cập nhật thành công!');

                        loadPendingAppointments();

                    alert('Lỗi cập nhật lịch khám');

                const maBN = document.getElementById('editMaBN').value;
                const maBacSi = document.getElementById('editMaBacSiStep').value;
                const ngayHen = document.getElementById('editNgayHen').value;
                const gioHen = document.getElementById('editGioHen').value;
                const lyDoKham = document.getElementById('editLyDoKham').value;

                try {
                    const res = await fetch(`http://localhost:3000/api/appointments/${maLK}`, {
                        method: 'PUT',

                            gioHen,

                        calendar.refetchEvents();
                        loadPendingAppointments();
                    } else {
                        const error = await res.json();
                        alert('Lỗi: ' + error.error);
                    }
                } catch (err) {
                    console.error('Lỗi xác nhận:', err);
                    alert('Lỗi xác nhận lịch khám');

                try {
                    const res = await fetch(`http://localhost:3000/api/appointments/${maLK}`, {

                        alert('Xóa thành công!');
                        editAppointmentModal.hide();
                        calendar.refetchEvents();
                        loadPendingAppointments();
                    } else {
                        const error = await res.json();
                        alert('Lỗi: ' + error.error);

            // Quick confirm appointment (without opening modal)
            async function confirmAppointmentQuick(maLK) {
                if (!confirm('Bạn có chắc muốn xác nhận lịch khám này?')) return;

                // Get appointment details first
                try {
                    const res = await fetch(`http://localhost:3000/api/appointments?tenBN=&maChuyenKhoa=&maBacSi=`);
                    const data = await res.json();
                    const appointment = data.find(app => app.id == maLK);

                    if (!appointment) {
                        alert('Không tìm thấy lịch khám');
                        return;
                    }

                    // Validate required information
                    const ngayHen = new Date(appointment.start).toISOString().split('T')[0];
                    const gioHen = new Date(appointment.start).toTimeString().slice(0, 5);
                    
                    if (!ngayHen || !gioHen || !appointment.title || !appointment.MaBN || !appointment.TenBacSi) {
                        alert('Thông tin lịch khám không đầy đủ (Ngày hẹn, Giờ hẹn, Bác sĩ là bắt buộc). Vui lòng sửa lịch khám trước khi xác nhận.');
                        return;
                    }

                    // Get maBacSi from allDoctors array using doctor name
                    let maBacSi = appointment.MaBacSi;
                    if (!maBacSi && appointment.TenBacSi && allDoctors.length > 0) {
                        const doctor = allDoctors.find(d => d.HoTen === appointment.TenBacSi);
                        maBacSi = doctor ? doctor.MaNV : null;
                    }

                    if (!maBacSi) {
                        alert('Thông tin lịch khám không đầy đủ (Mã bác sĩ không xác định). Vui lòng sửa lịch khám trước khi xác nhận.');
                        openEditModal(maLK);
                        return;
                    }

                    // Update appointment with new status
                    const updateRes = await fetch(`http://localhost:3000/api/appointments/${maLK}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            maBN: appointment.MaBN,
                            maBacSi: maBacSi,
                            ngayHen: ngayHen,
                            gioHen: gioHen,
                            lyDoKham: appointment.LyDoKham || '',
                            trangThai: 'DaXacNhan'
                        })
                    });

                    if (updateRes.ok) {
                        alert('Xác nhận lịch khám thành công!');
                        calendar.refetchEvents();
                        loadPendingAppointments();
                    } else {
                        const error = await updateRes.json();
                        alert('Lỗi: ' + error.error);
                    }
                } catch (err) {
                    console.error('Lỗi xác nhận:', err);
                    alert('Lỗi xác nhận lịch khám');
                }
            }

            async function deleteAppointment(maLK) {
                if (!confirm('Bạn có chắc muốn xóa lịch khám này?')) return;
                
                try {
                    const res = await fetch(`http://localhost:3000/api/appointments/${maLK}`, {
                        method: 'DELETE'
                    });

                    if (res.ok) {
                        alert('Xóa thành công!');
                        calendar.refetchEvents();
                        loadPendingAppointments();
                    } else {
                        const error = await res.json();
                        alert('Lỗi: ' + error.error);
                    }
                } catch (err) {
                    console.error('Lỗi xóa:', err);
                    alert('Lỗi xóa lịch khám');
                }
            }

            let debounceTimer;

            inputTenBN.addEventListener('input', () => {
                clearTimeout(debounceTimer);

                debounceTimer = setTimeout(() => {
                    calendar.refetchEvents();
                    loadPendingAppointments();
                }, 300);
            });

            // Tab change handler
            document.getElementById('appointmentTabs').addEventListener('shown.bs.tab', (e) => {
                if (e.target.id === 'table-tab') {
                    loadPendingAppointments();
                }
            });

                    fetch(`/api/appointments?maChuyenKhoa=${maChuyenKhoa}&maBacSi=${maBacSi}`)
                        .then(res => {
                            if (res.status === 401) {
                                localStorage.removeItem('token');
                                window.location.href = '/signin';
                                return;
                            }
                            if (!res.ok) throw new Error("Lỗi lấy lịch khám");
                            return res.json();
                        })
                        .then(data => {
                            successCallback(Array.isArray(data) ? data : []);
                            console.log("Dữ liệu lịch đã tải:", data);
                        })
                        .catch(err => {
                            console.error("Lỗi Fetch Lịch:", err);
                            failureCallback(err);
                        });
                },
            ),

            calendar.render();

            // Load danh sách khoa
            fetch('/api/specialty')
                .then(res => {
                    if (res.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = '/signin';
                        return;
                    }
                    if (!res.ok) throw new Error("Lỗi lấy danh sách khoa");
                    return res.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        data.forEach(k => {
                            const option = new Option(k.TenChuyenKhoa, k.MaChuyenKhoa);
                            selectKhoa.add(option);
                        });
                    }
                })
                .catch(err => console.error("Lỗi Fetch Khoa:", err));

                // Load all doctors and pending appointments
                loadAllDoctors();
                loadPendingAppointments();

            // 3. Sự kiện khi chọn Khoa
            selectKhoa.addEventListener('change', async function() {
                const maKhoa = this.value;
                selectBacSi.innerHTML = '<option value="">-- Tất cả bác sĩ --</option>';

                if (maKhoa) {
                    selectBacSi.disabled = false;
                    try {
                        const res = await fetch(`/api/doctor/doctor-by-specialty?maChuyenKhoa=${maKhoa}`);
                        if (res.status === 401) {
                            localStorage.removeItem('token');
                            window.location.href = '/signin';
                            return;
                        }
                        if (!res.ok) throw new Error("Lỗi lấy danh sách bác sĩ");

                        const doctors = await res.json();
                        if (Array.isArray(doctors)) {
                            doctors.forEach(bs => {
                                const option = new Option(bs.HoTen, bs.MaNV);
                                selectBacSi.add(option);
                            });
                        }
                    } catch (err) {
                        console.error("Lỗi load bác sĩ:", err);
                        selectBacSi.disabled = true;
                    }
                } else {
                    selectBacSi.disabled = true;
                }

                calendar.refetchEvents();
                loadPendingAppointments();
            });

            // Khi chọn bác sĩ → refetch lịch
            selectBacSi.addEventListener('change', () => {
                calendar.refetchEvents();
                loadPendingAppointments();
            });
        
    </script>
